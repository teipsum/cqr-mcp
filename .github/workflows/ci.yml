name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MIX_ENV: test
  CQR_BUILD_NIF: "true"

jobs:
  build-and-test:
    name: build, test, credo, format
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        elixir: ["1.19.5"]
        otp: ["28"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Elixir deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-deps-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-deps-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Cache Elixir _build
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-mix-build-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-build-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Cache cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/cqr_grafeo/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Rust target (NIF)
        uses: actions/cache@v4
        with:
          path: native/cqr_grafeo/target
          key: ${{ runner.os }}-nif-target-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('native/cqr_grafeo/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-nif-target-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Fetch dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

      - name: Credo (strict)
        run: mix credo --strict

      - name: Check formatting
        run: mix format --check-formatted
