# Release workflow — precompiled NIF binaries.
#
# Triggered on tag push matching `v*` (e.g. `v0.1.0`). Cross-compiles the
# `cqr_grafeo` NIF for every supported target, attaches the resulting
# tarballs and SHA256 checksums to the GitHub release. `rustler_precompiled`
# on the client side fetches the matching binary from the release URL at
# `mix deps.get` time, so downstream users do not need a Rust toolchain.
#
# Matrix targets (keep in sync with `lib/grafeo/native.ex :: targets`):
#   - aarch64-apple-darwin       (macOS ARM  — M1/M2/M3/M4)
#   - x86_64-apple-darwin        (macOS Intel)
#   - x86_64-unknown-linux-gnu   (Linux x86_64)
#   - aarch64-unknown-linux-gnu  (Linux ARM64, cross-compiled)
#
# Implementation follows the Explorer / Tokenizers pattern:
# https://github.com/elixir-explorer/explorer/blob/main/.github/workflows/precompile.yml

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build_release:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # Keep this list aligned with the `nif_versions` in
        # `lib/grafeo/native.ex`. NIF 2.16 covers OTP 24+.
        nif: ["2.16"]
        job:
          - { target: aarch64-apple-darwin,      os: macos-14 }
          - { target: x86_64-apple-darwin,       os: macos-13 }
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-22.04 }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-22.04, use-cross: true }

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract project version
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(awk -F'"' '/^  @version / { print $2; exit }' mix.exs)" >> "$GITHUB_ENV"

      - name: Build the NIF
        id: build-crate
        uses: philss/rustler-precompiled-action@v1.1.4
        with:
          project-name: cqr_grafeo
          project-version: ${{ env.PROJECT_VERSION }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use-cross }}
          project-dir: "native/cqr_grafeo"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build-crate.outputs.file-name }}
          path: ${{ steps.build-crate.outputs.file-path }}

      - name: Publish to GitHub release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ steps.build-crate.outputs.file-path }}
